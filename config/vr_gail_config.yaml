behaviors:
  PlayerAI:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 20480
      learning_rate: 0.0001
      beta: 0.001
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
      memory: 
        sequence_length: 128
        memory_size: 256
        
    reward_signals:
      gail:
        gamma: 0.99
        strength: 0.8
        network_settings:
          normalize: false
          hidden_units: 256
          num_layers: 2
        learning_rate: 0.0001
        use_actions: true
        use_vail: false
        demo_path: C:\Users\User\AI_Enemy\Demonstrations\Playerdata.demo
    
    behavioral_cloning:
      strength: 0.3
      gamma: 0.99
      demo_path: C:\Users\User\AI_Enemy\Demonstrations\Playerdata.demo
      steps: 2000000

    checkpoint_interval: 500000
    max_steps: 10000000
    keep_checkpoints: 10
    time_horizon: 128
    summary_freq: 100000
