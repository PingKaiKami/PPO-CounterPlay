behaviors:
  EnemyAI: # 這個名字必須和你在 Behavior Parameters 中設定的 Behavior Name 一樣
    trainer_type: ppo # 使用 PPO 演算法，這是最常用的
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99 # 折扣因子，代表對未來獎勵的重視程度
        strength: 1.0
    max_steps: 3000000 # 總訓練步數
    time_horizon: 128
    summary_freq: 50000