behaviors:
  EnemyAI: # 這個名字必須和你在 Behavior Parameters 中設定的 Behavior Name 一樣
    trainer_type: ppo # 使用 PPO 演算法，這是最常用的
    hyperparameters:
      batch_size: 4096
      buffer_size: 40960
      learning_rate: 0.001
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      beta_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 512
      num_layers: 4
    reward_signals:
      extrinsic:
        gamma: 0.99 # 折扣因子，代表對未來獎勵的重視程度
        strength: 1.0
    checkpoint_interval: 10000000
    max_steps: 50000000
    time_horizon: 256
    summary_freq: 100000