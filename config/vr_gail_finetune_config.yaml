behaviors:
  EnemyAI: # 名字必須保持一樣
    trainer_type: ppo
    hyperparameters:
      batch_size: 4096
      buffer_size: 40960
      learning_rate: 0.0005
      beta: 0.02
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      beta_schedule: linear

    network_settings:
      normalize: false
      hidden_units: 512
      num_layers: 3
      memory:
        sequence_length: 128  # AI 能「回想」過去多少個步驟的資訊
        memory_size: 256
      
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    checkpoint_interval: 500000
    keep_checkpoints: 10
    max_steps: 20000000
    time_horizon: 256
    summary_freq: 500000