behaviors:
  PlayerAI:
    trainer_type: ppo
    hyperparameters:
      batch_size: 64
      buffer_size: 1024
      learning_rate: 0.0001
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 3
      memory: 
        sequence_length: 32 # 記憶長度：AI 訓練時會回顧過去 X 個步驟的因果關係
        memory_size: 128
        
    reward_signals:
      gail:
        gamma: 0.99
        strength: 0.5 
        network_settings:
          normalize: false
          hidden_units: 128
          num_layers: 3
        learning_rate: 0.0001
        use_actions: true
        use_vail: false
        demo_path: C:\Users\User\AI_Enemy\Demonstrations\Playerdata.demo
    
    behavioral_cloning:
      strength: 1.0
      gamma: 0.99
      demo_path: C:\Users\User\AI_Enemy\Demonstrations\Playerdata.demo
      steps: 2000000

    max_steps: 2000000
    time_horizon: 128
    summary_freq: 50000