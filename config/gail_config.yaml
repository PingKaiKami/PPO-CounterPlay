behaviors:
  PlayerAI: # 這裡必須跟 Behavior Parameters 的 Behavior Name 一模一樣
    trainer_type: ppo
    hyperparameters:
      batch_size: 128
      buffer_size: 2048
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2
    reward_signals:
      # 1. GAIL 獎勵 (核心：模仿風格)
      gail:
        gamma: 0.99
        strength: 0.5
        network_settings:
          normalize: false
          hidden_units: 128
          num_layers: 2
        learning_rate: 0.0003
        use_actions: false
        use_vail: false
        demo_path: C:\Users\User\AI_Enemy\Demonstrations\Playerdata.demo # 對應你的錄製檔案路徑
    
    # 2. BC 行為複製 (核心：前期快速引導)
    behavioral_cloning:
      strength: 1.0
      gamma: 0.99
      demo_path: C:\Users\User\AI_Enemy\Demonstrations\Playerdata.demo # 對應你的錄製檔案路徑
      steps: 100000 # 在 5萬步之後，BC 強度歸零，完全交給 GAIL

    max_steps: 3000000 # 總訓練步數，依需求增減
    time_horizon: 64
    summary_freq: 50000